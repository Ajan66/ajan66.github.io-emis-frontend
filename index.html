<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMIS Mark Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-12 min-h-screen font-sans">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-bold text-blue-900">EMIS மதிப்பெண் பதிவு</h1>
            <p class="text-xs text-slate-500">EMIS Mark Entry System</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-8">
        <div class="bg-white rounded-2xl p-6 shadow-md border border-slate-100 flex flex-col items-center">
            <label class="w-full flex flex-col items-center justify-center h-52 border-2 border-dashed border-blue-300 rounded-xl cursor-pointer bg-blue-50/50 hover:bg-blue-50 transition-all overflow-hidden relative">
                <div id="upload-prompt" class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                    <span class="text-3xl mb-2">📸</span>
                    <p class="text-sm font-semibold text-blue-700">மதிப்பெண் பட்டியலை பதிவேற்றவும்</p>
                    <p class="text-xs text-slate-400 mt-1">PNG, JPG or JPEG</p>
                </div>
                <img id="image-preview" class="hidden w-full h-full object-contain" />
                <input type="file" id="file-input" accept="image/*" class="hidden" />
            </label>

            <button id="upload-btn" class="w-full mt-5 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2">
                <span>📤</span> மதிப்பெண்களை பிரித்தெடு
            </button>
        </div>

        <div id="status-message" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-4 mt-6 text-blue-700 font-semibold"></div>

        <div id="results-section" class="hidden bg-white rounded-2xl p-6 shadow-md border border-slate-100 mt-6">
            <h2 class="text-lg font-bold text-slate-800 border-b pb-3 mb-4 flex items-center gap-2">
                <span>📊</span> கண்டறியப்பட்ட தரவு
            </h2>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 font-semibold">
                            <th class="p-3">பாடம் (Subject)</th>
                            <th class="p-3 text-center">மொத்தம் (Total)</th>
                            <th class="p-3 text-center">பெற்ற மதிப்பெண்</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const uploadPrompt = document.getElementById('upload-prompt');
        const uploadBtn = document.getElementById('upload-btn');
        const statusMessage = document.getElementById('status-message');
        const resultsSection = document.getElementById('results-section');
        const tableBody = document.getElementById('table-body');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) {
                alert('தயவுசெய்து முதலில் ஒரு படத்தை தேர்ந்தெடுக்கவும்.');
                return;
            }

            statusMessage.textContent = '⏳ மதிப்பெண்கள் பிரிக்கப்படுகிறது...';
            statusMessage.classList.remove('hidden');
            statusMessage.className = "bg-blue-50 border border-blue-200 rounded-xl p-4 mt-6 text-blue-700 font-semibold";
            resultsSection.classList.add('hidden');

            const formData = new FormData();
            formData.append('image', file);

            try {
                // FIXED: Added /api/ prefix to the URL
                const response = await fetch('https://emis-backend-qt8l.onrender.com/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Server returned an error status.');

                const data = await response.json();
                tableBody.innerHTML = '';

                if(data.data) {
                    data.data.forEach(item => {
                        const row = `<tr>
                            <td class="p-3 font-medium text-slate-700">${item.student_name || 'N/A'}</td>
                            <td class="p-3 text-center text-slate-500">${item.student_id || '-'}</td>
                            <td class="p-3 text-center font-bold text-blue-600">${item.marks || 0}</td>
                        </tr>`;
                        tableBody.insertAdjacentHTML('beforeend', row);
                    });
                    statusMessage.classList.add('hidden');
                    resultsSection.classList.remove('hidden');
                } else {
                    throw new Error('Data format mismatch.');
                }
            } catch (err) {
                statusMessage.textContent = '⚠️ பிழை: ' + err.message;
                statusMessage.className = "bg-red-50 border border-red-200 rounded-xl p-4 mt-6 text-red-700 font-semibold";
            }
        });
    </script>
</body>
</html>
